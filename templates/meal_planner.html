<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner | WELLNEST</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:url('/static/images/bg.jpg') no-repeat center center fixed;background-size:cover;color:#0b2b26;min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:0 5%}
        
        header{padding:1.2rem 0;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1)}
        nav{display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.6rem;font-weight:800;color:#0b2b26}
        .nav-links{display:flex;align-items:center;gap:2rem}
        .nav-links a{color:#0b2b26;text-decoration:none;font-weight:500;font-size:.85rem}
        .nav-links a.cta-button{background:#0b2b26;color:white;padding:.5rem 1.8rem;border-radius:50px}
        .nav-links a.active{color:#1a7a5a;font-weight:700}

        .page-title{text-align:center;padding:3rem 0 2rem}
        .page-title h1{font-size:2.8rem;font-weight:800;color:#0b2b26}
        .page-title h1 span{color:#1a7a5a}
        .page-title p{font-size:1.1rem;color:#0b2b26;font-weight:500;margin-top:.5rem}
        .form-section{background:rgba(255,255,255,0.12);backdrop-filter:blur(15px);border-radius:30px;padding:2.5rem;border:1px solid rgba(255,255,255,0.15);margin-bottom:2rem}
        .form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
        .form-group label{display:block;font-weight:600;color:#0b2b26;margin-bottom:.5rem;font-size:.9rem}
        .form-group select,.form-group input{width:100%;padding:.8rem 1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.15);backdrop-filter:blur(5px);color:#0b2b26;font-size:.9rem;font-family:'Inter',sans-serif}
        .form-group select option{background:#fff;color:#0b2b26}
        .form-group select:focus,.form-group input:focus{outline:2px solid #1a7a5a;border-color:transparent}
        .form-group .checkbox-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
        .form-group .checkbox-group label{display:flex;align-items:center;gap:.5rem;font-weight:400;font-size:.85rem;cursor:pointer}
        .form-group .checkbox-group input[type="checkbox"]{width:18px;height:18px;accent-color:#1a7a5a}
        .select-all-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#0b2b26;padding:.4rem 1.2rem;border-radius:20px;cursor:pointer;font-size:.8rem;font-weight:500;transition:all .3s;margin-left:1rem}
        .select-all-btn:hover{background:rgba(26,122,90,0.15);border-color:#1a7a5a}

        .btn-generate{background:#0b2b26;color:white;border:none;padding:1rem 3rem;border-radius:50px;font-weight:700;font-size:1.1rem;cursor:pointer;transition:all .3s;margin-top:1.5rem;width:100%}
        .btn-generate:hover{background:#1a4d44;transform:scale(1.02)}

        .results-section{display:none;background:rgba(255,255,255,0.1);backdrop-filter:blur(15px);border-radius:30px;padding:2.5rem;border:1px solid rgba(255,255,255,0.15);margin-top:2rem}
        .results-section.active{display:block;animation:fadeIn 0.6s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        .results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
        .results-header h2{font-size:1.8rem;color:#0b2b26}
        .results-header .btn-download{background:#1a7a5a;color:white;border:none;padding:.6rem 1.8rem;border-radius:50px;font-weight:600;cursor:pointer;transition:all .3s}
        .results-header .btn-download:hover{background:#0b2b26;transform:scale(1.02)}

        .day-card{background:rgba(255,255,255,0.08);border-radius:16px;padding:1.5rem;margin-bottom:1rem;border:1px solid rgba(255,255,255,0.08)}
        .day-card h3{font-size:1.2rem;color:#0b2b26;margin-bottom:.8rem}
        .day-card .meals{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
        .day-card .meal{background:rgba(255,255,255,0.05);border-radius:12px;padding:1rem;text-align:center;cursor:pointer;transition:all .3s}
        .day-card .meal:hover{background:rgba(255,255,255,0.15);transform:scale(1.02)}
        .day-card .meal .meal-icon{font-size:1.8rem;display:block;margin-bottom:.3rem}
        .day-card .meal .meal-name{font-weight:600;color:#0b2b26;font-size:.95rem}
        .day-card .meal .meal-desc{font-size:.8rem;color:#0b2b26;opacity:.6}

        .recipe-popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);z-index:9999;justify-content:center;align-items:center;animation:fadeIn 0.3s ease}
        .recipe-popup.active{display:flex}
        .recipe-popup .popup-content{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:30px;padding:2.5rem;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;position:relative;border:1px solid rgba(255,255,255,0.2)}
        .recipe-popup .close-btn{position:absolute;top:15px;right:20px;font-size:2rem;color:#0b2b26;cursor:pointer;transition:all .3s;background:none;border:none}
        .recipe-popup .close-btn:hover{transform:rotate(90deg)}
        .recipe-popup .popup-title{font-size:1.8rem;font-weight:800;color:#0b2b26;margin-bottom:.5rem;display:flex;align-items:center;gap:1rem}
        .recipe-popup .popup-subtitle{font-size:.9rem;color:#0b2b26;opacity:.6;margin-bottom:1.5rem}
        .recipe-popup .popup-section{margin-bottom:1rem}
        .recipe-popup .popup-section h4{font-size:1rem;font-weight:700;color:#0b2b26;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
        .recipe-popup .popup-section ul{list-style:none;padding:0}
        .recipe-popup .popup-section ul li{padding:.3rem 0;font-size:.9rem;color:#0b2b26;display:flex;align-items:center;gap:.5rem}
        .recipe-popup .popup-section ul li::before{content:'▸';color:#1a7a5a;font-weight:700}
        .recipe-popup .popup-section p{font-size:.9rem;color:#0b2b26;line-height:1.6}
        .recipe-popup .popup-tags{display:flex;gap:.5rem;flex-wrap:wrap;margin:.5rem 0 1rem}
        .recipe-popup .popup-tags span{background:rgba(26,122,90,0.1);color:#1a7a5a;padding:.2rem .8rem;border-radius:20px;font-size:.75rem;font-weight:600}

        .grocery-list{background:rgba(255,255,255,0.08);border-radius:16px;padding:1.5rem;margin-top:1.5rem}
        .grocery-list h3{font-size:1.2rem;color:#0b2b26;margin-bottom:.8rem}
        .grocery-list ul{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;list-style:none}
        .grocery-list ul li{padding:.4rem 0;color:#0b2b26;font-size:.9rem;display:flex;align-items:center;gap:.5rem}
        .grocery-list ul li::before{content:'✓';color:#1a7a5a;font-weight:700}

        @media(max-width:768px){
            .form-grid{grid-template-columns:1fr 1fr}
            .day-card .meals{grid-template-columns:1fr}
            .grocery-list ul{grid-template-columns:1fr}
            .nav-links{flex-wrap:wrap;justify-content:center;gap:1rem}
            nav{flex-direction:column;gap:1rem}
            .page-title h1{font-size:2rem}
            .results-header{flex-direction:column;text-align:center}
            .form-group .checkbox-group{grid-template-columns:1fr 1fr}
            .recipe-popup .popup-content{padding:1.5rem}
            .recipe-popup .popup-title{font-size:1.4rem}
        }
        @media(max-width:480px){
            .form-grid{grid-template-columns:1fr}
            .form-group .checkbox-group{grid-template-columns:1fr}
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <nav>
            <div class="logo">🥗 WELLNEST</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/meal-planner" class="active">Meal Planner</a>
                <a href="/food-scanner">Food Scanner</a>
                <a href="/login" class="cta-button">Login</a>
            </div>
        </nav>
    </div>
</header>

<section class="page-title">
    <div class="container">
        <h1>🍽️ <span>Meal Planning</span> & Recommendations</h1>
        <p>AI creates personalized weekly meal plans based on your diet type, cooking time, and food preferences.</p>
    </div>
</section>

<section class="container">
    <div class="form-section">
        <div class="form-grid">
            <div class="form-group">
                <label>🌱 Diet Type</label>
                <select id="diet">
                    <option value="balanced">Balanced</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                    <option value="keto">Keto</option>
                    <option value="gluten-free">Gluten-Free</option>
                    <option value="jain">Jain</option>
                    <option value="halal">Halal</option>
                    <option value="nonveg">Non-Vegetarian</option>
                </select>
            </div>

            <div class="form-group">
                <label>📅 Days</label>
                <select id="days">
                    <option value="1">1 Day</option>
                    <option value="3">3 Days</option>
                    <option value="7" selected>7 Days</option>
                    <option value="14">14 Days</option>
                    <option value="30">30 Days</option>
                </select>
            </div>

            <div class="form-group">
                <label>⏰ Cooking Time</label>
                <select id="cookTime">
                    <option value="any">Any Time</option>
                    <option value="15">Under 15 min</option>
                    <option value="30">Under 30 min</option>
                    <option value="45">Under 45 min</option>
                    <option value="60">Under 60 min</option>
                </select>
            </div>

            <div class="form-group">
                <label>🍽️ Meal Type</label>
                <select id="mealType">
                    <option value="all">All Meals</option>
                    <option value="veg">Vegetarian</option>
                    <option value="nonveg">Non-Vegetarian</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-top:1.5rem">
            <label>🥗 Food Preferences (Select what you like)
                <button class="select-all-btn" onclick="selectAll()">✅ Select All</button>
                <button class="select-all-btn" onclick="unselectAll()">❌ Unselect All</button>
            </label>
            <div class="checkbox-group" id="foodPreferences">
                <label><input type="checkbox" value="vegetables" checked> 🥬 Vegetables</label>
                <label><input type="checkbox" value="greens" checked> 🌿 Greens</label>
                <label><input type="checkbox" value="healthycarbs" checked> 🍠 Healthy Carbs</label>
                <label><input type="checkbox" value="millets" checked> 🌾 Millets</label>
                <label><input type="checkbox" value="grains" checked> 🌾 Grains</label>
                <label><input type="checkbox" value="fruits" checked> 🍎 Fruits</label>
                <label><input type="checkbox" value="protein" checked> 🥩 Protein</label>
                <label><input type="checkbox" value="meat" checked> 🍖 Meat</label>
                <label><input type="checkbox" value="dairy" checked> 🥛 Dairy</label>
                <label><input type="checkbox" value="healthyfats" checked> 🥑 Healthy Fats</label>
                <label><input type="checkbox" value="nutsseeds" checked> 🥜 Nuts & Seeds</label>
                <label><input type="checkbox" value="legumes" checked> 🫘 Legumes & Beans</label>
                <label><input type="checkbox" value="spices" checked> 🌶️ Spices & Herbs</label>
                <label><input type="checkbox" value="tubers" checked> 🥔 Tubers & Roots</label>
            </div>
        </div>

        <button class="btn-generate" onclick="generateMealPlan()">✨ Generate Meal Plan</button>
    </div>

    <div class="results-section" id="results">
        <div class="results-header">
            <h2>📋 Your Meal Plan</h2>
            <button class="btn-download" onclick="downloadPlan()">📥 Download PDF</button>
        </div>

        <div id="mealPlanContainer"></div>

        <div class="grocery-list" id="groceryList">
            <h3>🛒 Your Grocery List</h3>
            <ul id="groceryItems"></ul>
        </div>
    </div>
</section>

<!-- Recipe Popup -->
<div class="recipe-popup" id="recipePopup">
    <div class="popup-content">
        <button class="close-btn" onclick="closeRecipe()">✕</button>
        <div id="recipeContent">
            <!-- Recipe content will be inserted here -->
        </div>
    </div>
</div>

    function selectAll() {
        document.querySelectorAll('#foodPreferences input[type="checkbox"]').forEach(cb => {
            cb.checked = true;
        });
    }

    function unselectAll() {
        document.querySelectorAll('#foodPreferences input[type="checkbox"]').forEach(cb => {
            cb.checked = false;
        });
    }

    function getSelectedPreferences() {
        const selected = [];
        document.querySelectorAll('#foodPreferences input[type="checkbox"]:checked').forEach(cb => {
            selected.push(cb.value);
        });
        return selected;
    }

    function openRecipe(mealName) {
    // Remove emoji and special characters for matching
    let cleanName = mealName.replace(/[^\w\s,]/g, '').trim();
    // Try exact match first
    let recipe = recipes[mealName];
    if (!recipe) {
        // Try clean match
        recipe = recipes[cleanName];
    }
    if (!recipe) {
        // Try partial match - find first recipe that contains the name
        const keys = Object.keys(recipes);
        for (let key of keys) {
            if (cleanName.includes(key) || key.includes(cleanName)) {
                recipe = recipes[key];
                break;
            }
        }
    }
    if (!recipe) {
        alert('📖 Recipe coming soon for ' + mealName);
        return;
    }

    const popup = document.getElementById('recipePopup');
    const content = document.getElementById('recipeContent');

    content.innerHTML = `
        <div class="popup-title">${recipe.icon || '🍽️'} ${mealName}</div>
        <div class="popup-tags">
            <span>⏱️ Prep: ${recipe.prepTime}</span>
            <span>🔥 Cook: ${recipe.cookTime}</span>
            <span>📊 ${recipe.difficulty}</span>
            ${recipe.tags ? recipe.tags.map(tag => `<span>#${tag}</span>`).join('') : ''}
        </div>
        <div class="popup-section">
            <h4>🛒 Ingredients</h4>
            <ul>
                ${recipe.ingredients ? recipe.ingredients.map(ing => `<li>${ing}</li>`).join('') : '<li>Ingredients coming soon</li>'}
            </ul>
        </div>
        <div class="popup-section">
            <h4>👨‍🍳 Instructions</h4>
            <ol style="padding-left:1.5rem;color:#0b2b26;font-size:.9rem;line-height:1.8;">
                ${recipe.instructions ? recipe.instructions.map(step => `<li>${step}</li>`).join('') : '<li>Instructions coming soon</li>'}
            </ol>
        </div>
    `;

    popup.classList.add('active');
    document.body.style.overflow = 'hidden';
}

    function closeRecipe() {
        document.getElementById('recipePopup').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    document.getElementById('recipePopup').addEventListener('click', function(e) {
        if (e.target === this) {
            closeRecipe();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeRecipe();
        }
    });
