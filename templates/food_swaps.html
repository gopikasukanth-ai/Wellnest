        .comparison-item .value{font-size:1.8rem;font-weight:800;display:block;margin:.3rem 0}

        .comparison-item .value.good-color{color:#1a7a5a}
        .comparison-item .unit{font-size:.8rem;color:#0b2b26;opacity:.5}

    function findSwap() {
        const input = document.getElementById('foodSearch');
        const query = input.value.trim().toLowerCase();
        
        if (!query) {
            alert('Please type a food to search for swaps!');
            return;
        }
        
        // Find matching swap
        let match = null;
        let matchKey = null;
        
        for (const [key, value] of Object.entries(swapDatabase)) {
            if (key.includes(query) || query.includes(key)) {
                match = value;
                matchKey = key;
                break;
            }
        }
        
        const results = document.getElementById('results');
        const content = document.getElementById('swapContent');
        
        if (match) {
            results.classList.add('active');
            content.innerHTML = createSwapHTML(matchKey, match);
        } else {
            results.classList.add('active');
            content.innerHTML = `
                <div class="no-result">
                    <span class="big-icon">🔍</span>
                    <h3>No swaps found for "${input.value}"</h3>
                    <p>Try searching for: White Rice, Sugar, Pasta, White Bread, Butter, Soda, Potato Chips</p>
                </div>
            `;
        }
    }

    function quickSwap(food) {
        document.getElementById('foodSearch').value = food;
        findSwap();
    }

    function createSwapHTML(key, data) {
        const bad = data.bad;
        const good = data.good;
        
        const calorieDiff = bad.calories - good.calories;
        const proteinDiff = (good.protein - bad.protein).toFixed(1);
        const carbDiff = (bad.carbs - good.carbs).toFixed(1);
        const fatDiff = (bad.fats - good.fats).toFixed(1);
        
        return `
            <div class="swap-result">
                <div class="bad">
                    <span class="icon-large">${bad.emoji}</span>
                    <div>
                        <div class="food-name">❌ ${bad.name}</div>
                        <div class="food-desc">${bad.calories} kcal • ${bad.carbs}g carbs • ${bad.protein}g protein</div>
                    </div>
                </div>
                
                <div class="arrow">⬇️ SWAP TO ⬇️</div>
                
                <div class="good">
                    <span class="icon-large">${good.emoji}</span>
                    <div>
                        <div class="food-name">✅ ${good.name}</div>
                        <div class="food-desc">${good.calories} kcal • ${good.carbs}g carbs • ${good.protein}g protein</div>
                    </div>
                </div>
                
                <div class="comparison-grid">
                    <div class="comparison-item">
                        <span class="label">Calories</span>
                        <span class="value bad-color">${bad.calories}</span>
                        <span class="unit">kcal</span>
                    </div>
                    <div class="comparison-vs">VS</div>
                    <div class="comparison-item">
                        <span class="label">Calories</span>
                        <span class="value good-color">${good.calories}</span>
                        <span class="unit">kcal</span>
                    </div>
                    
                    <div class="comparison-item">
                        <span class="label">Carbs</span>
                        <span class="value bad-color">${bad.carbs}g</span>
                        <span class="unit">carbohydrates</span>
                    </div>
                    <div class="comparison-vs">VS</div>
                    <div class="comparison-item">
                        <span class="label">Carbs</span>
                        <span class="value good-color">${good.carbs}g</span>
                        <span class="unit">carbohydrates</span>
                    </div>
                    
                    <div class="comparison-item">
                        <span class="label">Protein</span>
                        <span class="value bad-color">${bad.protein}g</span>
                        <span class="unit">protein</span>
                    </div>
                    <div class="comparison-vs">VS</div>
                    <div class="comparison-item">
                        <span class="label">Protein</span>
                        <span class="value good-color">${good.protein}g</span>
                        <span class="unit">protein</span>
                    </div>
                    
                    <div class="comparison-item">
                        <span class="label">Fats</span>
                        <span class="value bad-color">${bad.fats}g</span>
                        <span class="unit">fat</span>
                    </div>
                    <div class="comparison-vs">VS</div>
                    <div class="comparison-item">
                        <span class="label">Fats</span>
                        <span class="value good-color">${good.fats}g</span>
                        <span class="unit">fat</span>
                    </div>
                </div>
                
                <div class="swap-reason">
                    <h4>💡 Why swap to ${good.name}?</h4>
                    <p>${data.reason}</p>
                    <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap">
                        ${data.benefits.map(b => `<span style="background:rgba(26,122,90,0.1);color:#1a7a5a;padding:.2rem .8rem;border-radius:20px;font-size:.75rem;font-weight:600;">✓ ${b}</span>`).join('')}
                    </div>
                    <div style="margin-top:.8rem;font-size:.85rem;color:#0b2b26;opacity:.6;">
                        ${calorieDiff > 0 ? `🔥 Saves ${calorieDiff} calories per serving` : ''}
                        ${proteinDiff > 0 ? ` 💪 +${proteinDiff}g more protein` : ''}
                        ${carbDiff > 0 ? ` 🌾 ${carbDiff}g less carbs` : ''}
                        ${fatDiff > 0 ? ` 🧈 ${fatDiff}g less fat` : ''}
                    </div>
                </div>
            </div>
        `;
    }
